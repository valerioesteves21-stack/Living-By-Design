<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#111114"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="./manifest.json"/>
<title>STACK RPG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a12;
  --s1:#111120;
  --s2:#17172a;
  --s3:#1e1e33;
  --b1:#25253d;
  --b2:#2e2e4a;
  --b3:#3a3a58;
  --text:#eeeef8;
  --text2:#b8b8d0;
  --muted:#6b6b8a;
  --muted2:#40405a;
  --gold:#f5a623;
  --gold2:#ffd166;
  --gold-glow:rgba(245,166,35,0.12);
  --xp:#a78bfa;
  --xp2:#c4b5fd;
  --xp-glow:rgba(167,139,250,0.12);
  --hp:#34d399;
  --hp2:#6ee7b7;
  --hp-glow:rgba(52,211,153,0.1);
  --danger:#f87171;
  --warn:#fbbf24;
  --focus:#60a5fa;
  --focus2:#93c5fd;
  --focus-glow:rgba(96,165,250,0.1);
  --sys:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',Arial,sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sys);min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;padding-top:env(safe-area-inset-top)}

/* ── Char Card ── */
.char-card{padding:16px 16px 0;z-index:1}
.char-inner{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:16px;position:relative;overflow:hidden;box-shadow:none}
.char-top{display:flex;align-items:center;gap:12px}
.avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6d28d9,var(--xp2));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(167,139,250,0.3)}
.char-info{flex:1}
.char-name{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.char-title{font-size:11px;color:var(--xp2);letter-spacing:1px;text-transform:uppercase;margin-top:2px;font-weight:500}
.char-right{text-align:right}
.level-num{font-size:26px;font-weight:700;color:var(--gold);letter-spacing:-1px;line-height:1}
.level-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.bars{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-ico{font-size:12px;width:14px;text-align:center;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--s3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(.34,1.2,.64,1)}
.bar-fill.xp{background:linear-gradient(90deg,var(--xp),var(--xp2))}
.bar-fill.hp{background:linear-gradient(90deg,#16a34a,var(--hp2))}
.bar-lbl{font-size:10px;color:var(--muted);width:56px;text-align:right;font-variant-numeric:tabular-nums}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
.stat-c{text-align:center}
.stat-v{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.stat-k{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.stat-c.gld .stat-v{color:var(--gold)}
.stat-c.xpc .stat-v{color:var(--xp)}
.stat-c.stk .stat-v{color:var(--warn)}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;padding:12px 16px;z-index:1}
.tab{flex:1;padding:9px 4px;background:none;border:1px solid var(--b1);border-radius:12px;color:var(--muted);font-family:var(--sys);font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab .ti{font-size:15px;line-height:1}
.tab.active[data-t="quests"]{border-color:var(--hp);color:var(--hp);background:var(--hp-glow)}
.tab.active[data-t="rest"]{border-color:var(--xp);color:var(--xp2);background:var(--xp-glow)}
.tab.active[data-t="raids"]{border-color:var(--focus);color:var(--focus2);background:var(--focus-glow)}
.tab.active[data-t="log"]{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}

/* ── Content ── */
.content{flex:1;padding:0 16px 100px}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 0 rgba(255,255,255,0.03)}
.card-tag{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:12px}

/* ── Bar chart ── */
.chart{display:flex;align-items:flex-end;gap:5px;height:68px}
.bc-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.bc-val{font-size:8px;color:var(--muted);height:11px;display:flex;align-items:center;font-variant-numeric:tabular-nums}
.bc-col{flex:1;width:100%;display:flex;align-items:flex-end}
.bc-bar{width:100%;border-radius:3px 3px 2px 2px;transition:height 0.5s cubic-bezier(.34,1.56,.64,1)}
.bc-day{font-size:8px;color:var(--muted);height:11px;font-weight:500}
.bc-day.td{color:var(--text)}

/* ── Inputs ── */
.field label{display:block;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:6px}
.field input[type=time],.field input[type=text],.field input[type=number],.field textarea,
input[type=time],input[type=text],input[type=number],textarea{
  width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:11px;
  padding:11px 13px;color:var(--text);font-size:15px;font-family:var(--sys);outline:none;
  -webkit-appearance:none;transition:border-color 0.2s}
input:focus,textarea:focus{border-color:var(--b3)}
textarea{resize:none}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Hours big ── */
.hours-big{text-align:center;padding:8px 0}
.hours-big .hb-n{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1}
.hours-big .hb-u{font-size:13px;color:var(--muted);margin-left:4px}
.hours-big .hb-xp{font-size:11px;color:var(--xp2);margin-top:6px;font-weight:500}

/* ── Stars ── */
.stars{display:flex;gap:6px;margin-bottom:12px}
.star{flex:1;padding:8px 0;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--muted2);cursor:pointer;font-size:16px;text-align:center;transition:all 0.15s}
.star.on{border-color:var(--xp);background:var(--xp-glow);color:var(--xp2)}

/* ── Buttons ── */
.btn{width:100%;padding:13px;border-radius:12px;border:1px solid;font-family:var(--sys);font-size:13px;font-weight:600;letter-spacing:0.3px;cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.98)}
.btn-hp{border-color:var(--hp);color:var(--hp);background:var(--hp-glow)}
.btn-xp{border-color:var(--xp);color:var(--xp2);background:var(--xp-glow)}
.btn-focus{border-color:var(--focus);color:var(--focus2);background:var(--focus-glow)}
.btn-saved{border-color:var(--hp)!important;color:var(--hp)!important;background:rgba(48,209,88,0.12)!important}

/* ── Quests ── */
.quest-list{display:flex;flex-direction:column;gap:8px}
.quest-item{background:var(--s2);border:1px solid var(--b1);border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:11px;transition:all 0.2s;position:relative;overflow:hidden}
.quest-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--b2);transition:background 0.3s;border-radius:3px 0 0 3px}
.quest-item.done{border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.04)}
.quest-item.done::before{background:var(--hp)}
.quest-cb{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--b2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:transparent;font-size:13px}
.quest-cb.chk{border-color:var(--hp);background:var(--hp);color:#000}
.quest-body{flex:1;min-width:0}
.quest-name{font-size:14px;color:var(--text);font-weight:500;transition:all 0.2s}
.quest-name.done{color:var(--muted);text-decoration:line-through}
.quest-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.q-xp{font-size:10px;color:var(--xp2);font-weight:500}
.q-str{font-size:10px;color:var(--warn)}
.q-mult{font-size:10px;color:var(--gold);background:var(--gold-glow);padding:1px 5px;border-radius:4px;font-weight:600}
.quest-del{background:none;border:none;color:var(--muted2);cursor:pointer;padding:5px;border-radius:7px;transition:color 0.2s;font-size:15px;line-height:1;display:flex;align-items:center}
.quest-del:hover{color:var(--danger)}

/* ── Add row ── */
.add-row{display:flex;gap:8px;align-items:center}
.add-row input{flex:1}
.diff-sel{background:var(--s2);border:1px solid var(--b2);border-radius:11px;padding:11px 10px;color:var(--xp2);font-size:13px;font-family:var(--sys);outline:none;cursor:pointer;-webkit-appearance:none;font-weight:500}
.add-go{width:44px;height:44px;border-radius:11px;border:1px solid var(--hp);background:var(--hp-glow);color:var(--hp);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;transition:all 0.2s}

/* ── Perfect day ── */
.bonus-card{background:linear-gradient(135deg,rgba(245,166,35,0.06),rgba(167,139,250,0.04));border:1px solid rgba(245,166,35,0.15);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}

/* ── Raids ── */
.timer-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:8px}
.t-circle{width:160px;height:160px;position:relative;display:flex;align-items:center;justify-content:center}
.t-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.t-time{font-size:40px;font-weight:700;letter-spacing:-2px;color:var(--text);z-index:1}
.t-lbl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:600}
.presets{display:flex;gap:7px;margin-bottom:12px}
.preset{flex:1;padding:9px 0;border-radius:10px;border:1px solid;font-family:var(--sys);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.preset.on{border-color:var(--focus);color:var(--focus2);background:var(--focus-glow)}
.preset:not(.on){border-color:var(--b2);color:var(--muted);background:none}
.raid-btns{display:flex;gap:8px}
.raid-btns .btn{flex:1}

.raid-item{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.ri-name{font-size:13px;color:var(--text);font-weight:500}
.ri-meta{font-size:10px;color:var(--muted);margin-top:2px}
.ri-mins{font-size:22px;font-weight:700;color:var(--focus2);letter-spacing:-0.5px}
.ri-xp{font-size:10px;color:var(--xp2);margin-top:2px;font-weight:500}

/* ── Achievements ── */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ach{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:12px}
.ach.unlocked{border-color:rgba(245,166,35,0.25);background:rgba(245,166,35,0.04)}
.ach.locked{opacity:0.35}
.ach-ico{font-size:20px;margin-bottom:5px}
.ach-name{font-size:11px;color:var(--text);font-weight:600;margin-bottom:2px}
.ach.unlocked .ach-name{color:var(--gold)}
.ach-desc{font-size:10px;color:var(--muted);line-height:1.4}

/* ── Log feed ── */
.feed-item{background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
.fi-ico{font-size:18px;flex-shrink:0}
.fi-text{flex:1;font-size:12px;color:var(--text2)}
.fi-xp{font-size:11px;font-weight:600;flex-shrink:0}

/* ── Stat mini ── */
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.mini-s{background:var(--s1);border:1px solid var(--b1);border-radius:13px;padding:12px;text-align:center}
.ms-v{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.ms-k{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;font-weight:600}

/* ── XP burst ── */
.xp-burst{position:fixed;font-size:15px;font-weight:700;color:var(--xp2);pointer-events:none;z-index:9999;animation:burstUp 1.2s ease forwards}
@keyframes burstUp{0%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:0.7;transform:translateY(-55px) scale(1.1)}100%{opacity:0;transform:translateY(-70px) scale(0.9)}}

/* ── Level up overlay ── */
#lvlup{position:fixed;inset:0;background:rgba(10,10,18,0.92);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(10px)}
#lvlup.show{display:flex}
.lu-ico{font-size:60px;animation:luPop 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes luPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.lu-title{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:-0.5px}
.lu-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.lu-btn{margin-top:6px;padding:14px 40px;border-radius:14px;border:1px solid var(--gold);background:var(--gold-glow);color:var(--gold);font-family:var(--sys);font-size:14px;font-weight:600;cursor:pointer}
.lu-rays{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 42%,rgba(245,166,35,0.08) 0%,transparent 55%)}

/* ── Toast ── */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--b2);border-radius:99px;padding:9px 18px;font-size:12px;font-weight:500;color:var(--text);pointer-events:none;opacity:0;transition:all 0.3s;white-space:nowrap;z-index:9997;letter-spacing:0.3px;backdrop-filter:blur(10px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Divider ── */
.div{height:1px;background:var(--b1);margin:12px 0}

/* ── Empty ── */
.empty{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;line-height:2}

/* ── Anim ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp 0.28s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div class="char-card">
    <div class="char-inner">
      <div class="char-top">
        <div class="avatar" id="avatarEl">⚔️</div>
        <div class="char-info">
          <div class="char-name" id="charName">Founder</div>
          <div class="char-title" id="charTitleEl">Novice</div>
        </div>
        <div class="char-right">
          <div class="level-num" id="lvlNum">1</div>
          <div class="level-lbl">Level</div>
        </div>
      </div>
      <div class="bars">
        <div class="bar-row">
          <div class="bar-ico">⚡</div>
          <div class="bar-track"><div class="bar-fill xp" id="xpBar" style="width:0%"></div></div>
          <div class="bar-lbl" id="xpLabel">0 / 120</div>
        </div>
        <div class="bar-row">
          <div class="bar-ico">❤️</div>
          <div class="bar-track"><div class="bar-fill hp" id="hpBar" style="width:100%"></div></div>
          <div class="bar-lbl" id="hpLabel">100 HP</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-c gld"><div class="stat-v" id="goldVal">0</div><div class="stat-k">Gold</div></div>
        <div class="stat-c xpc"><div class="stat-v" id="totalXpVal">0</div><div class="stat-k">Total XP</div></div>
        <div class="stat-c stk"><div class="stat-v" id="streakVal">0</div><div class="stat-k">Streak</div></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-t="quests" onclick="switchTab('quests')"><span class="ti">⚔️</span>Quests</button>
    <button class="tab" data-t="rest" onclick="switchTab('rest')"><span class="ti">🌙</span>Rest</button>
    <button class="tab" data-t="raids" onclick="switchTab('raids')"><span class="ti">🔥</span>Raids</button>
    <button class="tab" data-t="log" onclick="switchTab('log')"><span class="ti">📜</span>Log</button>
  </div>

  <div class="content" id="content"></div>
</div>

<div id="lvlup">
  <div class="lu-rays"></div>
  <div class="lu-ico">🏆</div>
  <div class="lu-title" id="luTitle">LEVEL UP!</div>
  <div class="lu-sub" id="luSub">You reached Level 2</div>
  <button class="lu-btn" onclick="closeLevelUp()">Continue →</button>
</div>
<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const TITLES=['Novice','Apprentice','Grinder','Builder','Operator','Strategist','Visionary','Architect','Legend','Mythic'];
const TITLE_LV=[1,3,5,8,12,17,23,30,40,50];
const XP_PER_LV=lv=>lv*120;
const AVATARS=['⚔️','🧠','🚀','⚡','🔥','💎','🏆'];
const HABIT_XP={easy:15,medium:30,hard:50};
const SLEEP_XP={great:80,good:50,ok:25,bad:10};
const RAID_XP={25:40,50:85,90:150};
const RAID_GOLD={25:15,50:35,90:65};
const STREAK_MULT=s=>s>=30?3:s>=14?2:s>=7?1.75:s>=3?1.4:1;

// ── STATE ───────────────────────────────────────────────
let G={
  name:'Founder',avatar:0,totalXp:0,level:1,hp:100,gold:0,
  habits:[],completions:{},sleep:{},raids:[],
  hoursWorked:{},weight:{},achievements:{},lastHpCheck:null,
};
let tab='quests';
let timer={running:false,secs:25*60,total:25*60,name:'',iv:null,customMode:false};

// ── STORAGE ─────────────────────────────────────────────
function save(){localStorage.setItem('stackrpg2',JSON.stringify(G));}
function load(){try{const d=localStorage.getItem('stackrpg2');if(d)G={...G,...JSON.parse(d)};}catch(e){}}

// ── DATES ───────────────────────────────────────────────
const today=()=>new Date().toISOString().split('T')[0];
const last7=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];});
const shortDay=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short'});
const fmtDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const prevDay=d=>{const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()-1);return dt.toISOString().split('T')[0];};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ── HELPERS ─────────────────────────────────────────────
function calcHours(bt,wk){
  if(!bt||!wk)return null;
  const[bh,bm]=bt.split(':').map(Number);const[wh,wm]=wk.split(':').map(Number);
  let m=(wh*60+wm)-(bh*60+bm);if(m<0)m+=1440;return(m/60).toFixed(1);
}
function calcStreak(id){
  let s=0;const dt=new Date();
  while(true){const k=dt.toISOString().split('T')[0];if(!(G.completions[k]||[]).includes(id))break;s++;dt.setDate(dt.getDate()-1);if(s>365)break;}
  return s;
}
function bestStreak(){let b=0;G.habits.forEach(h=>{const s=calcStreak(h.id);if(s>b)b=s;});return b;}

// ── LEVEL ───────────────────────────────────────────────
function getLevel(xp){let lv=1,rem=xp;while(rem>=XP_PER_LV(lv)){rem-=XP_PER_LV(lv);lv++;}return{level:lv,xpIn:rem,xpNeed:XP_PER_LV(lv)};}
function getTitle(lv){let t=TITLES[0];for(let i=TITLE_LV.length-1;i>=0;i--){if(lv>=TITLE_LV[i]){t=TITLES[i];break;}}return t;}
function addXp(amt,_l,x,y){
  const old=getLevel(G.totalXp).level;
  G.totalXp=Math.max(0,G.totalXp+amt);
  save();updateCharCard();
  const nw=getLevel(G.totalXp).level;
  if(nw>old)setTimeout(()=>showLevelUp(nw),300);
  if(amt>0)spawnBurst('+'+amt+' XP',x,y);
}

// ── HP ───────────────────────────────────────────────────
const clamp=(v)=>Math.min(100,Math.max(0,v));
function dailyHpCheck(){
  const d=today();
  if(G.lastHpCheck===d)return;
  G.lastHpCheck=d;
  const prev=prevDay(d);
  const penalties=[];
  const se=G.sleep[prev]||G.sleep[d];
  if(se&&se.bedtime&&se.wake){
    const h=parseFloat(calcHours(se.bedtime,se.wake)||0);
    const target=h>=7?100:h>=6?85:h>=5?65:h>=3?40:20;
    const delta=target-(G.hp||100);
    if(delta>0)penalties.push({d:delta,r:'Rested well'});
    else if(delta<0)penalties.push({d:delta,r:'Poor sleep'});
  } else {
    penalties.push({d:-15,r:'No sleep logged'});
  }
  if(G.habits.length>0){
    const done=(G.completions[prev]||[]).length;
    const rate=done/G.habits.length;
    if(rate===0)penalties.push({d:-25,r:'No quests done yesterday'});
    else if(rate<0.8)penalties.push({d:-15,r:'Under 80% quests done'});
  }
  G.habits.forEach(h=>{
    if(!(G.completions[prev]||[]).includes(h.id)){
      const db=prevDay(prev);
      if((G.completions[db]||[]).includes(h.id)){
        let s=0;const dt=new Date(db+'T12:00:00');
        while((G.completions[dt.toISOString().split('T')[0]]||[]).includes(h.id)){s++;dt.setDate(dt.getDate()-1);if(s>365)break;}
        if(s>=7)penalties.push({d:-20,r:'7d streak broken: '+h.name});
        else if(s>=3)penalties.push({d:-10,r:'3d streak broken: '+h.name});
      }
    }
  });
  if(penalties.length){
    let tot=0;penalties.forEach(p=>tot+=p.d);
    G.hp=clamp((G.hp||100)+tot);save();updateCharCard();
    setTimeout(()=>{
      penalties.forEach((p,i)=>setTimeout(()=>toast((p.d<0?'❤️ ':' 💚 ')+p.r+' ('+(p.d>0?'+':'')+p.d+' HP)',p.d<0?'var(--danger)':'var(--hp2)'),i*600));
    },800);
  }
}

    const isDone=done.includes(h.id);

    const xp=Math.round(base*mult*(hp/100));
    return '<div class="quest-item '+(isDone?'done':'')+'">'+
      '<button class="quest-cb '+(isDone?'chk':'')+'" onclick="toggleQuest(\''+h.id+'\',event)">'+(isDone?'✓':'')+'</button>'+

    '</div>'+

        '<option value="medium" selected>Medium · +30 XP</option>'+
        '<option value="hard">Hard · +50 XP</option>'+
      '</select>'+
      '<button class="add-go" onclick="addQuest()">+</button>'+
    '</div>'+
  '</div>'+

    '<div class="card-tag">Quest Board ('+total+')</div>'+

function toggleQuest(id,ev){
  const d=today();if(!G.completions[d])G.completions[d]=[];
  const idx=G.completions[d].indexOf(id);
  const h=G.habits.find(x=>x.id===id);if(!h)return;
  if(idx>-1){
    G.completions[d].splice(idx,1);
    addXp(-Math.round(HABIT_XP[h.diff||'medium']));
    toast('Quest unchecked');
  }else{
    G.completions[d].push(id);
    const str=calcStreak(id);const mult=STREAK_MULT(str);const hp=G.hp||100;
    const xp=Math.round(HABIT_XP[h.diff||'medium']*mult*(hp/100));
    addXp(xp,null,ev?.clientX,ev?.clientY);
    checkAchievements();
    const all=G.habits.every(x=>G.completions[d].includes(x.id));
    if(all)setTimeout(()=>{addXp(100);toast('🌟 Perfect Day! +100 bonus XP','var(--gold)');},400);
    else toast('Quest done! +'+xp+' XP');
  }
  save();render();updateCharCard();
}
function addQuest(){
  const inp=document.getElementById('qIn');const name=inp?.value?.trim();if(!name)return;
  const diff=document.getElementById('qDiff')?.value||'medium';
  G.habits.push({id:uid(),name,diff,createdAt:today()});
  save();toast('"'+name+'" added');render();
}
function deleteQuest(id){
  G.habits=G.habits.filter(h=>h.id!==id);
  Object.keys(G.completions).forEach(d=>{G.completions[d]=(G.completions[d]||[]).filter(i=>i!==id);});
  save();toast('Quest removed');render();
}

    '<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">'+
      '<div><div style="font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;text-transform:uppercase">Daily avg</div><div style="font-size:16px;font-weight:700;color:var(--focus2);margin-top:2px">'+avgHwV+(avgHwV!=='--'?'h':'')+'</div></div>'+
      '<div style="text-align:right"><div style="font-size:9px;color:var(--muted);letter-spacing:1px;font-weight:600;text-transform:uppercase">Week total</div><div style="font-size:16px;font-weight:700;color:var(--xp2);margin-top:2px">'+totHw+'h</div></div>'+
    '</div>'+
    '<div style="height:1px;background:var(--b1);margin:12px 0"></div>'+
    '<div style="display:flex;gap:9px;align-items:center">'+
      '<input type="number" id="hwIn" value="'+todHw+'" min="0" max="24" step="0.5" placeholder="Hours worked today (e.g. 7.5)" style="flex:1;font-size:16px"/>'+
      '<button onclick="logHours()" style="padding:11px 18px;border-radius:11px;border:1px solid var(--focus);background:var(--focus-glow);color:var(--focus2);font-family:var(--sys);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Log</button>'+
    '</div>'+
    (todHw?'<div style="text-align:center;margin-top:12px"><span style="font-size:40px;font-weight:700;color:var(--focus2);letter-spacing:-2px">'+todHw+'</span><span style="font-size:14px;color:var(--muted);margin-left:6px">hrs today</span></div>':'')+
  '</div>'+
  '<div class="card">'+
    '<div class="card-tag">Focus Raid</div>'+
    '<div class="timer-wrap">'+
      '<div class="t-circle">'+
        '<svg width="160" height="160" viewBox="0 0 160 160">'+
          '<circle cx="80" cy="80" r="'+rad+'" fill="none" stroke="var(--s3)" stroke-width="7"/>'+
          '<circle cx="80" cy="80" r="'+rad+'" fill="none" stroke="'+tcol+'" stroke-width="7" stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear,stroke 0.3s;filter:'+(timer.running?'drop-shadow(0 0 6px var(--focus))':'none')+'"/>'+
        '</svg>'+
        '<div class="t-time">'+mm+':'+ss+'</div>'+
      '</div>'+
      '<div class="t-lbl">'+(timer.running?'Raid in progress':'Set your duration')+'</div>'+
    '</div>'+
    '<div style="margin-bottom:12px">'+
      '<div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:8px">Quick Presets</div>'+
      '<div class="presets">'+presets+'</div>'+
      '<div style="font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:6px;margin-top:12px">Custom Duration</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<input type="number" id="customMins" min="1" max="480" step="1" placeholder="Minutes e.g. 45" value="'+(timer.customMode?totalMins:'')+'" style="flex:1;font-size:15px" onchange="setCustomTimer(this.value)"/>'+
        '<div style="font-size:12px;color:var(--muted);white-space:nowrap">min</div>'+
      '</div>'+
    '</div>'+
    '<div class="field" style="margin-bottom:12px"><label>Raid name</label><input type="text" id="raidName" value="'+timer.name+'" placeholder="What are you working on?" maxlength="60"/></div>'+
    '<div class="raid-btns">'+
      '<button class="btn btn-focus" onclick="'+(timer.running?'pauseRaid()':'startRaid()')+'">'+(timer.running?'Pause':'Start Raid')+'</button>'+
      '<button class="btn" onclick="resetRaid()" style="border-color:var(--b2);color:var(--muted);background:none;max-width:76px">Reset</button>'+
    '</div>'+
  '</div>'+
  (G.raids.length>0?'<div class="card"><div class="card-tag">Raid History</div>'+raidLog+'</div>':'');
}
function setRaidTimer(m){if(timer.running)return;timer.total=m*60;timer.secs=m*60;timer.customMode=false;render();}
function setCustomTimer(v){
  const m=parseInt(v);
  if(!m||m<1||m>480)return;
  if(timer.running)return;
  timer.total=m*60;timer.secs=m*60;timer.customMode=true;
  // Update display without full re-render
  const mm=String(Math.floor(timer.secs/60)).padStart(2,'0');
  const el=document.querySelector('.t-time');if(el)el.textContent=mm+':00';
}
function startRaid(){
  if(timer.running)return;timer.running=true;
  const rn=document.getElementById('raidName');if(rn)timer.name=rn.value;
  timer.iv=setInterval(()=>{timer.secs--;if(timer.secs<=0){clearInterval(timer.iv);timer.running=false;completeRaid();return;}updateRaidDisplay();},1000);
  render();
}
function pauseRaid(){clearInterval(timer.iv);timer.running=false;render();}
function resetRaid(){clearInterval(timer.iv);timer.running=false;timer.secs=timer.total;render();}
function completeRaid(){
  const dur=Math.round(timer.total/60);const xp=RAID_XP[dur]||40;const gold=RAID_GOLD[dur]||15;
  G.raids.push({id:uid(),name:timer.name||'Focus Raid',duration:dur,xp,gold,completedAt:new Date().toISOString()});
  G.gold+=gold;addXp(xp);checkAchievements();save();
  timer.secs=timer.total;
  toast('⚔️ Raid done! +'+xp+' XP & +'+gold+'🪙','var(--focus2)');
  if(navigator.vibrate)navigator.vibrate([150,80,150,80,300]);
  render();updateCharCard();
}
function updateRaidDisplay(){
  const mm=String(Math.floor(timer.secs/60)).padStart(2,'0');
  const ss=String(timer.secs%60).padStart(2,'0');
  const el=document.querySelector('.t-time');if(el)el.textContent=mm+':'+ss;
  const rad=70,circ=2*Math.PI*rad;
  const off=circ-((1-timer.secs/timer.total)*circ);
  const c=document.querySelectorAll('.t-circle circle')[1];
  if(c)c.style.strokeDashoffset=off.toFixed(2);
}

// ── LOG ─────────────────────────────────────────────────
const ACHS=[
  {id:'fq',ico:'⚔️',name:'First Blood',desc:'Complete your first quest',chk:()=>Object.values(G.completions).some(a=>a.length>0)},
  {id:'s3',ico:'🔥',name:'On Fire',desc:'3-day streak on any habit',chk:()=>G.habits.some(h=>calcStreak(h.id)>=3)},
  {id:'s7',ico:'💥',name:'Unstoppable',desc:'7-day streak',chk:()=>G.habits.some(h=>calcStreak(h.id)>=7)},
  {id:'s30',ico:'🌟',name:'Legendary',desc:'30-day streak',chk:()=>G.habits.some(h=>calcStreak(h.id)>=30)},
  {id:'pd',ico:'🏆',name:'Perfect Day',desc:'Complete all quests',chk:()=>Object.keys(G.completions).some(d=>G.habits.length>0&&G.habits.every(h=>(G.completions[d]||[]).includes(h.id)))},
  {id:'gs',ico:'😴',name:'Deep Sleeper',desc:'Log 7+ hours sleep',chk:()=>Object.values(G.sleep).some(s=>parseFloat(calcHours(s.bedtime,s.wake)||0)>=7)},
  {id:'fr',ico:'⚡',name:'First Raid',desc:'Complete a focus raid',chk:()=>G.raids.length>0},
  {id:'dr',ico:'🧠',name:'Deep Work',desc:'Complete a 90-min raid',chk:()=>G.raids.some(r=>r.duration>=90)},
  {id:'g100',ico:'🪙',name:'Gold Collector',desc:'Accumulate 100 gold',chk:()=>G.gold>=100},
  {id:'l5',ico:'💎',name:'Operator',desc:'Reach Level 5',chk:()=>getLevel(G.totalXp).level>=5},
  {id:'l10',ico:'👑',name:'Visionary',desc:'Reach Level 10',chk:()=>getLevel(G.totalXp).level>=10},
  {id:'hw8',ico:'⏱',name:'Full Day',desc:'Log 8+ hours worked',chk:()=>Object.values(G.hoursWorked).some(h=>h>=8)},
];
function checkAchievements(){
  ACHS.forEach(a=>{if(!G.achievements[a.id]&&a.chk()){G.achievements[a.id]=true;save();setTimeout(()=>toast('🏆 '+a.name+' unlocked!','var(--gold)'),500);}});
}
function renderLog(){
  const d=today();
  const evts=[];
  [...G.raids].forEach(r=>evts.push({t:new Date(r.completedAt).getTime(),ico:'⚔️',txt:(r.name||'Focus Raid')+' — '+r.duration+'m',xp:r.xp,col:'var(--focus2)'}));
  Object.entries(G.sleep).forEach(([date,s])=>{if(s.xpAwarded){const h=parseFloat(calcHours(s.bedtime,s.wake)||0);evts.push({t:new Date(date+'T09:00:00').getTime(),ico:'🌙',txt:'Rest: '+h+'h on '+fmtDate(date),xp:h>=7?SLEEP_XP.great:h>=6?SLEEP_XP.good:h>=5?SLEEP_XP.ok:SLEEP_XP.bad,col:'var(--xp2)'});}});
  Object.entries(G.hoursWorked).forEach(([date,h])=>evts.push({t:new Date(date+'T08:00:00').getTime(),ico:'⏱',txt:h+'h worked on '+fmtDate(date),xp:0,col:'var(--focus2)'}));
  Object.entries(G.weight||{}).forEach(([date,w])=>{
    const parts=[];if(w.morning)parts.push('AM: '+w.morning+'kg');if(w.night)parts.push('PM: '+w.night+'kg');
    if(parts.length)evts.push({t:new Date(date+'T07:00:00').getTime(),ico:'⚖️',txt:parts.join(' / ')+' on '+fmtDate(date),xp:0,col:'var(--xp2)'});
  });
  evts.sort((a,b)=>b.t-a.t);
  const feed=evts.slice(0,12).map(e=>'<div class="feed-item"><div class="fi-ico">'+e.ico+'</div><div class="fi-text">'+e.txt+'</div>'+(e.xp?'<div class="fi-xp" style="color:'+e.col+'">+'+e.xp+'</div>':'')+'</div>').join('');
  const achHtml=ACHS.map(a=>'<div class="ach '+(G.achievements[a.id]?'unlocked':'locked')+'"><div class="ach-ico">'+a.ico+'</div><div class="ach-name">'+a.name+'</div><div class="ach-desc">'+a.desc+'</div></div>').join('');

  return '<div class="card"><div class="card-tag">Achievements ('+Object.keys(G.achievements).length+'/'+ACHS.length+')</div><div class="ach-grid">'+achHtml+'</div></div>'+
  (evts.length?'<div class="card"><div class="card-tag">Activity Feed</div>'+feed+'</div>':'<div class="card"><div class="empty">No activity yet.<br/>Start a quest or raid.</div></div>')+
  '<div class="card"><div class="card-tag">Character</div>'+
    '<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:6px">Name</div>'+
    '<div style="display:flex;gap:8px"><input type="text" id="nameIn" value="'+G.name+'" maxlength="20" placeholder="Your name" style="flex:1"/><button onclick="saveName()" style="padding:11px 16px;border-radius:11px;border:1px solid var(--gold);background:var(--gold-glow);color:var(--gold);font-family:var(--sys);font-size:13px;font-weight:600;cursor:pointer">Save</button></div></div>'+
    '<div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:8px">Avatar</div>'+
    '<div style="display:flex;gap:7px;flex-wrap:wrap">'+AVATARS.map((a,i)=>'<button onclick="setAvatar('+i+')" style="width:44px;height:44px;border-radius:11px;border:1px solid '+(G.avatar===i?'var(--gold)':'var(--b2)')+';background:'+(G.avatar===i?'var(--gold-glow)':'var(--s2)')+';font-size:20px;cursor:pointer">'+a+'</button>').join('')+'</div>'+
  '</div>';
}
function saveName(){const i=document.getElementById('nameIn');if(i&&i.value.trim()){G.name=i.value.trim();save();updateCharCard();toast('Name updated');}}
function setAvatar(i){G.avatar=i;save();updateCharCard();render();}

// ── INIT ────────────────────────────────────────────────
(async function init(){
  load();
  if(G.hp===undefined)G.hp=100;
  if(!G.hoursWorked)G.hoursWorked={};
  if(!G.weight)G.weight={};
  dailyHpCheck();
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('./sw.js');}catch(e){}}
  updateCharCard();render();
  document.addEventListener('input',e=>{if(e.target.id==='raidName')timer.name=e.target.value;});
})();
</script>
</body>
</html>
